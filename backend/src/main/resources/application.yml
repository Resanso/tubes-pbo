spring:
  application:
    name: mending-nabung

  datasource:
    # Neon DB connection — set these environment variables in your shell or .env
    # Format: jdbc:postgresql://<host>/<dbname>?sslmode=require
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Neon DB hibernates idle connections; keep pool small
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Required for Neon's TLS endpoint
      data-source-properties:
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: update   # use 'validate' in production
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080
  error:
    include-message: always

# CORS — allows the Vite dev server to reach the backend
app:
  cors:
    allowed-origins: "http://localhost:5173"
  jwt:
    secret: ${JWT_SECRET:changeme-in-production}
    expiration-ms: 86400000   # 24 h
